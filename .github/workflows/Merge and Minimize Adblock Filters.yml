name: Merge and Minimize Adblock Filters

on:
  schedule:
    # 每天 UTC 00:00（北京时间 08:00）运行一次
    - cron: '0 0 * * *'
  workflow_dispatch:  # 允许手动触发

jobs:
  merge:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Download source lists
        run: |
          echo "Downloading 217heidai list..."
          curl -sSL -o list1.txt \
            "https://raw.githubusercontent.com/217heidai/adblockfilters/main/rules/adblockdomain.txt"

          echo "Downloading hagezi list..."
          curl -sSL -o list2.txt \
            "https://cdn.jsdelivr.net/gh/hagezi/dns-blocklists@latest/wildcard/pro-onlydomains.txt"

      - name: Merge and minimize domains (Remove subdomains)
        run: |
          mkdir -p rules
          # 运行 Python 脚本进行合并与子域名去冗余
          python scripts/minimize.py rules/merged.txt list1.txt list2.txt
          
          # 清理临时文件
          rm -f list1.txt list2.txt

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add rules/merged.txt
          git add rules/removed_report.txt
          
          # 仅在文件内容有变化时才提交
          if ! git diff --cached --quiet; then
            git commit -m "Auto merge & minimize: $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          else
            echo "No changes to commit."
          fi
